[tox]
envlist = check-manifest,flake8,py

[testenv]
deps =
    pytest
    pytest-cov
    responses
    # mopidy <= 3.4.2 imports pkg_resources, which has been removed from setuptools v82.0.0
    setuptools < 82
commands =
    py.test --basetemp={envtmpdir} --cov=mopidy_podcast_itunes --cov-report term-missing {posargs}

[testenv:check-manifest]
deps =
    check-manifest
commands =
    check-manifest
skip_install = true

[testenv:flake8]
deps =
    flake8
    flake8-black
    flake8-bugbear
    flake8-import-order
    flake8-pyproject
commands =
    flake8
skip_install = true
